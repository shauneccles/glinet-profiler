<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>glinet-profiler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>glinet-profiler</h1>
    <p class="sub">Capture your GL.iNet device's API surface — read-only, your password stays on this machine.</p>
  </header>
  <form id="form">
    <label>Router IP <input id="host" type="text" value="192.168.8.1" required></label>
    <label>Username <input id="username" type="text" value="root"></label>
    <label>Password <input id="password" type="password" required></label>
    <label class="chk"><input id="ssh" type="checkbox" checked> try SSH ground-truth (default; falls back automatically)</label>
    <label class="chk danger"><input id="dangerous" type="checkbox"> ⚠ probe write endpoints — <b>changes your router's config</b> (spare routers only)</label>
    <label class="chk danger"><input id="destructive" type="checkbox" disabled> ☢ also probe destructive: reboot / factory-reset / firmware (<b>sacrificial routers only</b>)</label>
    <button type="submit">Capture</button>
  </form>
  <div id="progress" class="progress" hidden>
    <span class="spinner"></span>
    <span id="progress-msg"></span>
    <span id="progress-count" class="count"></span>
  </div>
  <p id="status" class="status"></p>
  <div id="banner"></div>
  <div id="actions" hidden>
    <button id="download">Download profile</button>
    <button id="submit">Submit to registry</button>
  </div>
  <main id="result"></main>
  <footer><p>Read-only. No identifiers or response values are included in the profile. Nothing is uploaded unless you click Submit.</p></footer>
  <script src="app.js"></script>
</body>
</html>
